# =============================================================================
# InfraForge UI — nginx config for serving the React SPA
# =============================================================================
# - Serves the Vite build from /usr/share/nginx/html
# - Falls back to index.html for client-side routes (try_files)
# - Long-cache hashed assets, never-cache index.html
# - Proxies /api/* to the Go API service (overridable via API_UPSTREAM env)
# - Adds basic security headers; gzip for text payloads
# =============================================================================

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Run as an unprivileged user — temp paths must live somewhere writable.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Resolve the API upstream from env at startup. Defaults to the in-cluster
    # service name; can be overridden via the API_UPSTREAM env var.
    map $host $api_upstream {
        default "http://infraforge-api:8080";
    }

    server {
        listen      8080 default_server;
        listen      [::]:8080 default_server;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ---- security headers ------------------------------------------------
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "DENY"           always;
        add_header Referrer-Policy           "no-referrer"    always;
        add_header X-XSS-Protection          "1; mode=block"  always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # ---- liveness / readiness -------------------------------------------
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ---- API passthrough -------------------------------------------------
        location /api/ {
            proxy_pass          $api_upstream;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-Id      $request_id;
            proxy_read_timeout  60s;
        }

        # ---- hashed build assets — immutable, year-long cache ---------------
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ---- index.html — never cached so deploys are picked up immediately
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }

        # ---- SPA fallback — every unmatched route serves index.html ---------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- block dotfiles --------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
