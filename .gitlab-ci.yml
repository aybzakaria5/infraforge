# =============================================================================
# InfraForge — GitLab CI/CD pipeline
# =============================================================================
# Lint → Test → Build → Scan (Trivy) → Push (ECR) → Deploy trigger (ArgoCD)
#
# The pipeline builds two images (api, ui), scans them with Trivy, pushes to
# ECR, and then bumps the image tag in the GitOps repo so ArgoCD picks it up.
#
# Branch strategy:
#   main           → deploy to production environment
#   develop        → deploy to staging environment
#   feature/*      → lint + test + build only (no push, no deploy)
#   merge_requests → lint + test + build + scan
# =============================================================================

stages:
  - lint
  - test
  - build
  - scan
  - push
  - deploy

# -----------------------------------------------------------------------------
# Global variables
# -----------------------------------------------------------------------------
variables:
  # Container build settings
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"

  # Image coordinates — overridden per-environment via the rules below
  AWS_REGION: "us-east-1"
  AWS_ACCOUNT_ID: "123456789012"
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  API_IMAGE: "${ECR_REGISTRY}/infraforge/api"
  UI_IMAGE: "${ECR_REGISTRY}/infraforge/ui"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

  # Trivy
  TRIVY_VERSION: "0.50.1"
  TRIVY_NO_PROGRESS: "true"
  TRIVY_CACHE_DIR: ".trivycache/"
  TRIVY_EXIT_CODE: "1"        # fail the job on findings at SEVERITY threshold
  TRIVY_SEVERITY: "HIGH,CRITICAL"

  # GitOps repo for ArgoCD image bumps
  GITOPS_REPO: "git@gitlab.com:aybzakaria5/infraforge-gitops.git"

# -----------------------------------------------------------------------------
# Reusable rule fragments
# -----------------------------------------------------------------------------
.rules:default-branches: &rules-default-branches
  - if: '$CI_COMMIT_BRANCH == "main"'
    variables:
      DEPLOY_ENV: "production"
  - if: '$CI_COMMIT_BRANCH == "develop"'
    variables:
      DEPLOY_ENV: "staging"
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    variables:
      DEPLOY_ENV: "review"
  - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    variables:
      DEPLOY_ENV: "dev"

.rules:push-and-deploy: &rules-push-and-deploy
  - if: '$CI_COMMIT_BRANCH == "main"'
    variables:
      DEPLOY_ENV: "production"
  - if: '$CI_COMMIT_BRANCH == "develop"'
    variables:
      DEPLOY_ENV: "staging"
  - when: never

# -----------------------------------------------------------------------------
# LINT
# -----------------------------------------------------------------------------
lint:terraform:
  stage: lint
  image: hashicorp/terraform:1.7
  script:
    - terraform fmt -check -recursive terraform/
    - cd terraform/environments/aws && terraform init -backend=false && terraform validate
  rules: *rules-default-branches

lint:go:
  stage: lint
  image: golangci/golangci-lint:v1.57-alpine
  script:
    - cd src/api && go vet ./... && golangci-lint run ./...
  rules: *rules-default-branches

lint:ui:
  stage: lint
  image: node:20-alpine
  cache:
    key: ui-deps-${CI_COMMIT_REF_SLUG}
    paths:
      - src/ui/node_modules/
  script:
    - cd src/ui && npm ci && npm run lint
  rules: *rules-default-branches

lint:helm:
  stage: lint
  image: alpine/helm:3.14.0
  script:
    - helm lint helm/infraforge-api
    - helm lint helm/infraforge-ui
    - helm lint helm/platform-services
  rules: *rules-default-branches

# -----------------------------------------------------------------------------
# TEST
# -----------------------------------------------------------------------------
test:api:
  stage: test
  image: golang:1.22-alpine
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: infraforge
    POSTGRES_PASSWORD: infraforge
    POSTGRES_DB: infraforge_test
    DATABASE_URL: "postgres://infraforge:infraforge@postgres:5432/infraforge_test?sslmode=disable"
  cache:
    key: go-mod-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
  script:
    - cd src/api && go test -race -coverprofile=coverage.out ./...
    - cd src/api && go tool cover -func=coverage.out | tail -1
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: src/api/coverage.xml
    expire_in: 1 week
  rules: *rules-default-branches

test:ui:
  stage: test
  image: node:20-alpine
  cache:
    key: ui-deps-${CI_COMMIT_REF_SLUG}
    paths:
      - src/ui/node_modules/
  script:
    - cd src/ui && npm ci && npm test -- --run
  rules: *rules-default-branches

# -----------------------------------------------------------------------------
# BUILD — produce OCI images locally; push happens in a later stage
# -----------------------------------------------------------------------------
.build-template: &build-template
  stage: build
  image: docker:25
  services:
    - docker:25-dind
  before_script:
    - docker info

build:api:
  <<: *build-template
  script:
    - docker build
        --build-arg VERSION=${IMAGE_TAG}
        -t ${API_IMAGE}:${IMAGE_TAG}
        -f docker/api/Dockerfile .
    - docker save ${API_IMAGE}:${IMAGE_TAG} -o api-image.tar
  artifacts:
    paths:
      - api-image.tar
    expire_in: 1 day
  rules: *rules-default-branches

build:ui:
  <<: *build-template
  script:
    - docker build
        --build-arg VERSION=${IMAGE_TAG}
        -t ${UI_IMAGE}:${IMAGE_TAG}
        -f docker/ui/Dockerfile .
    - docker save ${UI_IMAGE}:${IMAGE_TAG} -o ui-image.tar
  artifacts:
    paths:
      - ui-image.tar
    expire_in: 1 day
  rules: *rules-default-branches

# -----------------------------------------------------------------------------
# SCAN — Trivy image scan, fails on HIGH/CRITICAL
# -----------------------------------------------------------------------------
.scan-template: &scan-template
  stage: scan
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  cache:
    key: trivy-db
    paths:
      - .trivycache/

scan:api:
  <<: *scan-template
  needs:
    - job: build:api
      artifacts: true
  script:
    - trivy --version
    - trivy image --input api-image.tar
        --severity ${TRIVY_SEVERITY}
        --exit-code ${TRIVY_EXIT_CODE}
        --ignore-unfixed
        --format table
    - trivy image --input api-image.tar --format json --output api-trivy.json
  artifacts:
    when: always
    paths:
      - api-trivy.json
    expire_in: 1 week
  rules: *rules-default-branches

scan:ui:
  <<: *scan-template
  needs:
    - job: build:ui
      artifacts: true
  script:
    - trivy image --input ui-image.tar
        --severity ${TRIVY_SEVERITY}
        --exit-code ${TRIVY_EXIT_CODE}
        --ignore-unfixed
        --format table
    - trivy image --input ui-image.tar --format json --output ui-trivy.json
  artifacts:
    when: always
    paths:
      - ui-trivy.json
    expire_in: 1 week
  rules: *rules-default-branches

# -----------------------------------------------------------------------------
# PUSH — authenticate to ECR and push images (only on main / develop)
# -----------------------------------------------------------------------------
.push-template: &push-template
  stage: push
  image: docker:25
  services:
    - docker:25-dind
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region ${AWS_REGION}
        | docker login --username AWS --password-stdin ${ECR_REGISTRY}

push:api:
  <<: *push-template
  needs:
    - job: build:api
      artifacts: true
    - job: scan:api
  script:
    - docker load -i api-image.tar
    - docker push ${API_IMAGE}:${IMAGE_TAG}
    - docker tag ${API_IMAGE}:${IMAGE_TAG} ${API_IMAGE}:${DEPLOY_ENV}-latest
    - docker push ${API_IMAGE}:${DEPLOY_ENV}-latest
  rules: *rules-push-and-deploy

push:ui:
  <<: *push-template
  needs:
    - job: build:ui
      artifacts: true
    - job: scan:ui
  script:
    - docker load -i ui-image.tar
    - docker push ${UI_IMAGE}:${IMAGE_TAG}
    - docker tag ${UI_IMAGE}:${IMAGE_TAG} ${UI_IMAGE}:${DEPLOY_ENV}-latest
    - docker push ${UI_IMAGE}:${DEPLOY_ENV}-latest
  rules: *rules-push-and-deploy

# -----------------------------------------------------------------------------
# DEPLOY — bump image tag in the GitOps repo so ArgoCD reconciles
# -----------------------------------------------------------------------------
deploy:argocd:
  stage: deploy
  image: alpine/git:latest
  needs:
    - push:api
    - push:ui
  before_script:
    - apk add --no-cache yq openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "${GITOPS_DEPLOY_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - git config --global user.email "ci@infraforge.dev"
    - git config --global user.name "infraforge-ci"
  script:
    - git clone ${GITOPS_REPO} gitops
    - cd gitops
    - yq -i ".image.tag = \"${IMAGE_TAG}\"" environments/${DEPLOY_ENV}/api-values.yaml
    - yq -i ".image.tag = \"${IMAGE_TAG}\"" environments/${DEPLOY_ENV}/ui-values.yaml
    - git add environments/${DEPLOY_ENV}/
    - git commit -m "chore(${DEPLOY_ENV}): bump api and ui to ${IMAGE_TAG}" || echo "no changes"
    - git push origin main
  environment:
    name: ${DEPLOY_ENV}
    url: https://${DEPLOY_ENV}.infraforge.dev
  rules: *rules-push-and-deploy
