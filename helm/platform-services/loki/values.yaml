# Loki values for the grafana/loki chart (single-binary mode)
# Chart: https://github.com/grafana/helm-charts/tree/main/charts/loki
#
# Runs in monolithic (single-binary) mode — suitable for small-to-medium
# clusters. Switch to microservices mode for production workloads with
# high ingest rates (>100GB/day).

nameOverride: infraforge-loki

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

  limits_config:
    retention_period: 72h
    max_query_series: 500
    max_query_lookback: 72h
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    per_stream_rate_limit: 3MB
    per_stream_rate_limit_burst: 15MB

  # Compactor handles retention enforcement
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 5Gi

# Disable components not needed in single-binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Gateway (nginx reverse proxy in front of Loki)
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Monitoring — let Prometheus scrape Loki metrics
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: infraforge-monitoring
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

# No test pods
test:
  enabled: false
