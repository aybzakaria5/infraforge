# Promtail values for the grafana/promtail chart
# Chart: https://github.com/grafana/helm-charts/tree/main/charts/promtail
#
# Promtail runs as a DaemonSet, tailing container logs from each node
# and shipping them to Loki.

nameOverride: infraforge-promtail

config:
  clients:
    - url: http://infraforge-loki-gateway/loki/api/v1/push
      tenant_id: infraforge
      batchwait: 1s
      batchsize: 1048576  # 1MB

  snippets:
    # Pipeline stages for structured log parsing
    pipelineStages:
      # Try JSON first (Go API logs are structured JSON)
      - cri: {}
      - json:
          expressions:
            level: level
            msg: msg
            caller: caller
            request_id: request_id
            method: method
            path: path
            status: status
            duration: duration
      - labels:
          level:
          request_id:
      # Drop health check noise
      - match:
          selector: '{app="infraforge-api"}'
          stages:
            - regex:
                expression: '"path":"/healthz"'
            - drop:
                source: ""
                expression: '"/healthz"'
      # Timestamp extraction
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"

    # Extra relabel configs for enriching labels
    extraRelabelConfigs:
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_node_name
        target_label: node
      - action: replace
        source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_label_app_kubernetes_io_name
        target_label: app

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# ServiceMonitor for Promtail itself
serviceMonitor:
  enabled: true
  labels:
    release: infraforge-monitoring
