# Alertmanager configuration
# Applied via kube-prometheus-stack's alertmanager.config value
#
# Routes: critical → pagerduty, warning → slack, default → slack
# In local mode, all alerts go to a dead-letter webhook (no external services)

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "namespace", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default

  routes:
    - match:
        severity: critical
      receiver: pagerduty-critical
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        severity: warning
      receiver: slack-warning
      repeat_interval: 4h

# Inhibit warning if critical is already firing for the same alert
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "namespace"]

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#infraforge-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        actions:
          - type: button
            text: "Runbook"
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
          - type: button
            text: "Dashboard"
            url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'

  - name: slack-warning
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#infraforge-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: critical
        description: '{{ template "pagerduty.description" . }}'

templates:
  - "/etc/alertmanager/templates/*.tmpl"
