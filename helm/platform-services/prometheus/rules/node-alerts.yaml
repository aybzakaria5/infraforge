apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infraforge-node-alerts
  namespace: monitoring
  labels:
    release: infraforge-monitoring
    app.kubernetes.io/part-of: infraforge
spec:
  groups:
    # =============================================
    # Disk pressure
    # =============================================
    - name: infraforge.nodes.disk
      rules:
        - alert: DiskSpaceCritical
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"}
              /
              node_filesystem_size_bytes{mountpoint="/",fstype!="rootfs"}
            ) < 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} disk space critically low"
            description: >-
              Only {{ $value | humanizePercentage }} free disk space remaining
              on {{ $labels.instance }} ({{ $labels.mountpoint }}).
            runbook_url: "https://github.com/aybzakaria5/infraforge/blob/main/docs/runbooks/incident-response.md"

        - alert: DiskSpaceLow
          expr: |
            (
              node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"}
              /
              node_filesystem_size_bytes{mountpoint="/",fstype!="rootfs"}
            ) < 0.15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk space low"
            description: >-
              Only {{ $value | humanizePercentage }} free disk space remaining
              on {{ $labels.instance }}.

        - alert: DiskWillFillIn24h
          expr: |
            predict_linear(
              node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"}[6h], 24*3600
            ) < 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk predicted to fill within 24h"
            description: >-
              Based on the last 6h trend, the root filesystem on
              {{ $labels.instance }} will run out of space within 24 hours.

    # =============================================
    # Node resources
    # =============================================
    - name: infraforge.nodes.resources
      rules:
        - alert: HighNodeCPU
          expr: |
            1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU usage above 90%"
            description: >-
              CPU usage has been {{ $value | humanizePercentage }} for 15 minutes.
            dashboard_url: "http://grafana.infraforge.local/d/infraforge-cluster-health"

        - alert: HighNodeMemory
          expr: |
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory usage above 90%"
            description: >-
              Memory usage has been {{ $value | humanizePercentage }} for 10 minutes.
            dashboard_url: "http://grafana.infraforge.local/d/infraforge-cluster-health"

    # =============================================
    # PVC pressure
    # =============================================
    - name: infraforge.pvc.pressure
      rules:
        - alert: PVCNearlyFull
          expr: |
            (
              kubelet_volume_stats_used_bytes
              /
              kubelet_volume_stats_capacity_bytes
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} nearly full"
            description: >-
              PVC is {{ $value | humanizePercentage }} full.
              Consider expanding the volume or cleaning up data.
