apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infraforge-pod-alerts
  namespace: monitoring
  labels:
    release: infraforge-monitoring
    app.kubernetes.io/part-of: infraforge
spec:
  groups:
    # =============================================
    # Pod crash loops
    # =============================================
    - name: infraforge.pods.crashloop
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="infraforge"}[1h]) > 5
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: >-
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              has restarted {{ $value | humanize }} times in the last hour.
            runbook_url: "https://github.com/aybzakaria5/infraforge/blob/main/docs/runbooks/incident-response.md"

        - alert: PodFrequentRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="infraforge"}[1h]) > 2
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
            description: >-
              Container {{ $labels.container }} in pod {{ $labels.pod }}
              has restarted {{ $value | humanize }} times in the last hour.

    # =============================================
    # Pod readiness
    # =============================================
    - name: infraforge.pods.readiness
      rules:
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="infraforge",condition="true"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: >-
              Pod has been in a non-ready state for over 10 minutes.

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="infraforge"}
            !=
            kube_deployment_status_ready_replicas{namespace="infraforge"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has replica mismatch"
            description: >-
              Expected {{ $labels.spec_replicas }} replicas but only
              {{ $labels.ready_replicas }} are ready.
