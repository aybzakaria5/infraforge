apiVersion: v1
kind: ConfigMap
metadata:
  name: infraforge-grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: infraforge
data:
  cluster-health.json: |-
    {{ .Files.Get "dashboards/cluster-health.json" | nindent 4 }}
  app-metrics.json: |-
    {{ .Files.Get "dashboards/app-metrics.json" | nindent 4 }}
  cost-overview.json: |-
    {{ .Files.Get "dashboards/cost-overview.json" | nindent 4 }}
