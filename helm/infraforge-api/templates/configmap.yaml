apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "infraforge-api.fullname" . }}
  labels:
    {{- include "infraforge-api.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  SERVER_PORT: {{ .Values.config.serverPort | quote }}
  SERVER_READ_TIMEOUT: {{ .Values.config.serverReadTimeout | quote }}
  SERVER_WRITE_TIMEOUT: {{ .Values.config.serverWriteTimeout | quote }}
  SERVER_SHUTDOWN_TIMEOUT: {{ .Values.config.serverShutdownTimeout | quote }}
  MIGRATIONS_PATH: {{ .Values.config.migrationsPath | quote }}
