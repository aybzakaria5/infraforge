{{- if .Values.canary.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "infraforge-api.fullname" . }}-canary
  labels:
    {{- include "infraforge-api.labels" . | nindent 4 }}
    role: canary
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "infraforge-api.selectorLabels" . | nindent 4 }}
{{- end }}
